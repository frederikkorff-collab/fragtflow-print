<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FragtFlow Print — Indstillinger</title>
  <style>
    :root { --bg:#0b0f1a; --card:#141a2a; --border:#26304a; --text:#e7ecf5; --muted:#8b96ad; --primary:#3b82f6; --ok:#22c55e; --err:#ef4444; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: -apple-system, "Segoe UI", system-ui, sans-serif; background:var(--bg); color:var(--text); font-size:14px; }
    .wrap { padding:20px; }
    h1 { font-size:17px; margin:0 0 2px; }
    .sub { color:var(--muted); font-size:12px; margin:0 0 16px; }
    .field { margin-bottom:14px; }
    label { display:block; font-size:12px; color:var(--muted); margin-bottom:5px; }
    input, select { width:100%; height:34px; padding:0 10px; border-radius:8px; border:1px solid var(--border); background:var(--card); color:var(--text); outline:none; }
    input:focus, select:focus { border-color:var(--primary); }
    .row { display:flex; gap:10px; }
    .row > * { flex:1; }
    button { height:34px; padding:0 14px; border-radius:8px; border:1px solid var(--border); background:var(--card); color:var(--text); cursor:pointer; font-weight:500; }
    button.primary { background:var(--primary); border-color:var(--primary); color:#fff; }
    button:hover { opacity:.92; }
    .status { display:flex; align-items:center; gap:8px; padding:10px 12px; border-radius:8px; background:var(--card); border:1px solid var(--border); margin-bottom:16px; font-size:13px; }
    .dot { width:9px; height:9px; border-radius:50%; background:var(--muted); }
    .dot.ok { background:var(--ok); } .dot.err { background:var(--err); }
    .msg { margin-top:10px; font-size:12px; min-height:16px; }
    .msg.ok { color:var(--ok); } .msg.err { color:var(--err); }
    .counts { color:var(--muted); font-size:12px; margin-left:auto; }
    .actions { display:flex; gap:10px; margin-top:18px; }
    .actions button { flex:1; }
    .hint { font-size:11px; color:var(--muted); margin-top:4px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>FragtFlow Print</h1>
    <p class="sub">Udskriver fragtlabels automatisk fra din FragtFlow-kø.</p>

    <div class="status">
      <span id="dot" class="dot"></span>
      <span id="statusText">Indlæser…</span>
      <span id="counts" class="counts"></span>
    </div>

    <div class="field">
      <label for="token">Print-klient token</label>
      <input id="token" type="text" placeholder="Indsæt token fra FragtFlow → Indstillinger → Printere" />
      <div class="hint">Findes i FragtFlow under Indstillinger → Printere på den station du opretter.</div>
    </div>

    <div class="field">
      <label for="stationName">Stationsnavn</label>
      <input id="stationName" type="text" placeholder="f.eks. Pakkebord 1" />
    </div>

    <div class="field">
      <label for="printer">Printer</label>
      <div class="row">
        <select id="printer"></select>
        <button id="refreshPrinters" type="button" style="flex:0 0 auto;">↻</button>
      </div>
      <div class="hint">Tom = brug den printer serveren angiver for stationen.</div>
    </div>

    <div class="field">
      <label for="pollInterval">Tjek-interval (sekunder)</label>
      <input id="pollInterval" type="number" min="2" max="120" value="5" />
    </div>

    <div class="field">
      <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
        <input id="autoLaunch" type="checkbox" style="width:auto; height:auto;" />
        Start automatisk ved login
      </label>
    </div>

    <div class="msg" id="msg"></div>

    <div class="actions">
      <button id="test" type="button">Test forbindelse</button>
      <button id="save" type="button" class="primary">Gem</button>
    </div>
  </div>

  <script src="./settings.js"></script>
</body>
</html>
